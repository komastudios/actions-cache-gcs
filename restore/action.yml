name: "GCS cache restore"
author: komastudios
description: "Google Cloud Storage cache restore action with actions/cache@v5 fallback"
inputs:
  bucket:
    description: GCS bucket name
    required: true
  project:
    description: "GCP project ID (optional, uses Application Default Credentials project if omitted)"
    required: false
  path:
    description: "A list of files, directories, and wildcard patterns to cache and restore"
    required: true
  key:
    description: "An explicit key for restoring and saving the cache"
    required: true
  restore-keys:
    description: "An ordered list of keys to use for restoring the cache if no cache hit occurred for key"
    required: false
  use-fallback:
    description: "Use github actions/cache as fallback"
    required: false
    default: "true"
  fail-on-cache-miss:
    description: "Fail the workflow if cache entry is not found"
    required: false
    default: "false"
  lookup-only:
    description: "Check if a cache entry exists but don't download/extract it"
    required: false
    default: "false"
  retry:
    description: "Enable retry on failure for GCS operations"
    required: false
    default: "false"
  retry-count:
    description: "Number of times to retry GCS operations on failure"
    required: false
    default: "3"
outputs:
  cache-hit:
    description: "A boolean value to indicate an exact match was found for the primary key"
  cache-size:
    description: "An integer value denoting the size of the cache object found (measured in bytes)"
  cache-matched-key:
    description: "The key of the cache object found, if any"
runs:
  using: node24
  main: "../dist/restore/index.js"
branding:
  icon: "archive"
  color: "gray-dark"
